<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RepoRadar - 分析进度</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f8fafc; color: #1f2937; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    [v-cloak] { display: none; }
    .container { max-width: 640px; width: 100%; padding: 24px; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.03); padding: 32px; }
    .header { text-align: center; margin-bottom: 28px; }
    .header h1 { font-size: 22px; font-weight: 700; color: #1f2937; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .header h1 .pulse { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #667eea; animation: pulse 2s ease-in-out infinite; }
    .header h1 .pulse.done { background: #34d399; animation: none; }
    .header h1 .pulse.error { background: #f87171; animation: none; }
    .header p { font-size: 13px; color: #9ca3af; margin-top: 6px; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .stage { text-align: center; margin-bottom: 16px; }
    .stage-name { font-size: 15px; font-weight: 600; color: #4f46e5; text-transform: uppercase; letter-spacing: 1px; }
    .stage-msg { font-size: 13px; color: #6b7280; margin-top: 4px; }
    .progress-bar { width: 100%; height: 8px; background: #e5e7eb; border-radius: 9999px; overflow: hidden; margin-bottom: 24px; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 9999px; transition: width 0.5s ease; }
    .progress-fill.done { background: linear-gradient(90deg, #34d399, #059669); }
    .progress-fill.error { background: linear-gradient(90deg, #f87171, #dc2626); }
    .percent { text-align: center; font-size: 13px; color: #9ca3af; margin-top: -16px; margin-bottom: 20px; }
    .log-box { max-height: 280px; overflow-y: auto; border: 1px solid #f3f4f6; border-radius: 8px; padding: 12px; background: #fafafa; }
    .log-entry { display: flex; align-items: flex-start; gap: 8px; font-size: 12px; padding: 4px 0; border-bottom: 1px solid #f3f4f6; }
    .log-entry:last-child { border-bottom: none; }
    .log-time { color: #9ca3af; white-space: nowrap; font-family: "SFMono-Regular", Consolas, monospace; }
    .log-stage { color: #667eea; font-weight: 600; min-width: 80px; }
    .log-msg { color: #4b5563; flex: 1; word-break: break-all; }
    .complete-box { text-align: center; padding: 16px; margin-top: 16px; background: #f0fdf4; border-radius: 8px; border: 1px solid #bbf7d0; }
    .complete-box .icon { font-size: 36px; margin-bottom: 8px; }
    .complete-box .title { font-size: 16px; font-weight: 600; color: #059669; }
    .complete-box .path { font-size: 12px; color: #6b7280; margin-top: 6px; font-family: "SFMono-Regular", Consolas, monospace; word-break: break-all; }
    .complete-box .btn { display: inline-block; margin-top: 14px; padding: 8px 24px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; }
    .complete-box .btn:hover { opacity: 0.9; }
    .error-box { text-align: center; padding: 16px; margin-top: 16px; background: #fef2f2; border-radius: 8px; border: 1px solid #fecaca; }
    .error-box .icon { font-size: 36px; margin-bottom: 8px; }
    .error-box .title { font-size: 16px; font-weight: 600; color: #dc2626; }
    .error-box .msg { font-size: 13px; color: #6b7280; margin-top: 6px; }
    .footer { text-align: center; font-size: 12px; color: #9ca3af; margin-top: 16px; }
  </style>
</head>
<body>
<div id="app" v-cloak>
  <div class="container">
    <div class="card">
      <div class="header">
        <h1>
          <span class="pulse" :class="{ done: completed, error: hasError }"></span>
          📡 RepoRadar
        </h1>
        <p v-if="!completed && !hasError">正在分析中，请稍候...</p>
        <p v-else-if="completed">分析已完成</p>
        <p v-else>分析过程中遇到错误</p>
      </div>

      <div v-if="!completed && !hasError">
        <div class="stage">
          <div class="stage-name">{{ currentStage }}</div>
          <div class="stage-msg">{{ currentMessage }}</div>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" :style="{ width: percent + '%' }"></div>
        </div>
        <div class="percent">{{ percent }}%</div>
      </div>

      <div v-if="completed" class="complete-box">
        <div class="icon">✅</div>
        <div class="title">分析完成！</div>
        <div class="path">{{ reportPath }}</div>
        <a v-if="reportUrl" :href="reportUrl" class="btn">查看报告 →</a>
      </div>

      <div v-if="hasError" class="error-box">
        <div class="icon">❌</div>
        <div class="title">分析失败</div>
        <div class="msg">{{ errorMsg }}</div>
      </div>

      <div v-if="logs.length" class="log-box">
        <div class="log-entry" v-for="(log, i) in logs" :key="i">
          <span class="log-time">{{ log.time }}</span>
          <span class="log-stage">{{ log.stage }}</span>
          <span class="log-msg">{{ log.msg }}</span>
        </div>
      </div>
    </div>
    <div class="footer">RepoRadar v1.0.0 · 实时 SSE 进度</div>
  </div>
</div>

<script>
const { createApp } = Vue;

createApp({
  data() {
    return {
      currentStage: 'CONNECTING',
      currentMessage: '正在连接分析服务...',
      percent: 0,
      completed: false,
      hasError: false,
      reportPath: '',
      reportUrl: '',
      errorMsg: '',
      logs: []
    };
  },
  methods: {
    addLog(stage, msg) {
      var now = new Date();
      var t = String(now.getHours()).padStart(2,'0') + ':' +
              String(now.getMinutes()).padStart(2,'0') + ':' +
              String(now.getSeconds()).padStart(2,'0');
      this.logs.push({ time: t, stage: stage, msg: msg });
      if (this.logs.length > 100) this.logs.shift();
    },
    connect() {
      var self = this;
      var es = new EventSource('/api/sse');

      es.addEventListener('progress', function(e) {
        try {
          var d = JSON.parse(e.data);
          if (d && d.data) {
            self.currentStage = d.data.stage || '';
            self.currentMessage = d.data.message || '';
            self.percent = d.data.percent || 0;
            self.addLog(d.data.stage, d.data.message);
          }
        } catch(err) {}
      });

      es.addEventListener('complete', function(e) {
        try {
          var d = JSON.parse(e.data);
          if (d && d.data && d.data.reportPath) {
            self.reportPath = d.data.reportPath;
            var parts = d.data.reportPath.replace(/\\/g, '/').split('/');
            var filename = parts[parts.length - 1];
            self.reportUrl = '/report/' + filename;
          }
        } catch(err) {}
        self.completed = true;
        self.percent = 100;
        self.addLog('DONE', '分析完成');
        es.close();
      });

      es.addEventListener('error', function(e) {
        if (es.readyState === EventSource.CLOSED) {
          if (!self.completed) {
            self.hasError = true;
            self.errorMsg = '与服务器的连接已断开';
          }
          return;
        }
        try {
          if (e.data) {
            var d = JSON.parse(e.data);
            self.hasError = true;
            self.errorMsg = d.msg || '未知错误';
          }
        } catch(err) {
          if (!self.completed && !self.hasError) {
            self.currentStage = 'RECONNECTING';
            self.currentMessage = '正在重新连接...';
          }
        }
      });

      es.onopen = function() {
        self.currentStage = 'WAITING';
        self.currentMessage = '已连接，等待分析启动...';
        self.addLog('SSE', '连接成功');
      };
    }
  },
  mounted() {
    this.connect();
  }
}).mount('#app');
</script>
</body>
</html>
